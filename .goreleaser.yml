# GoReleaser configuration for the colophon app.
# https://goreleaser.com/customization/
version: 2

project_name: colophon

# App telemetry credentials are baked in here from repo secrets at build time. Defaulted to
# empty so a build without the secrets (a fork, a local snapshot) bakes nothing and reports
# nothing.
env:
  - COLOPHON_TELEMETRY_SERVER_URL={{ if index .Env "COLOPHON_TELEMETRY_SERVER_URL" }}{{ .Env.COLOPHON_TELEMETRY_SERVER_URL }}{{ end }}
  - COLOPHON_TELEMETRY_APP_KEY={{ if index .Env "COLOPHON_TELEMETRY_APP_KEY" }}{{ .Env.COLOPHON_TELEMETRY_APP_KEY }}{{ end }}

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: colophon
    main: ./cmd/colophon
    binary: colophon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # Version comes from the git tag (e.g. v0.0.1).
      - -X github.com/jmylchreest/colophon/internal/cli.version={{ .Version }}
      # App telemetry credentials (opt-out at runtime via telemetry.enabled / COLOPHON_TELEMETRY=off).
      - -X github.com/jmylchreest/colophon/internal/telemetry.DefaultServerURL={{ .Env.COLOPHON_TELEMETRY_SERVER_URL }}
      - -X github.com/jmylchreest/colophon/internal/telemetry.DefaultAppKey={{ .Env.COLOPHON_TELEMETRY_APP_KEY }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: colophon
    ids:
      - colophon
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-preview.{{ .Timestamp }}+{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^build\\(deps\\):"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: jmylchreest
    name: colophon
  draft: false
  prerelease: auto
  make_latest: "{{ if .IsSnapshot }}false{{ else }}true{{ end }}"
