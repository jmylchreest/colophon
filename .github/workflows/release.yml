name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # colophon's own app telemetry, baked into the released binaries (opt-out at runtime).
          # The ingest key is a public sf_live_ key, so a Variable is fine; a Secret also works.
          COLOPHON_TELEMETRY_SERVER_URL: ${{ secrets.COLOPHON_TELEMETRY_SERVER_URL || vars.COLOPHON_TELEMETRY_SERVER_URL }}
          COLOPHON_TELEMETRY_APP_KEY: ${{ secrets.COLOPHON_TELEMETRY_APP_KEY || vars.COLOPHON_TELEMETRY_APP_KEY }}
