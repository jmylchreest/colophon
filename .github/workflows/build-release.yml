name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      is_release: ${{ steps.version.outputs.is_release }}
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        uses: jmylchreest/gha-extract-git-version@v1

      - name: Check if build should be skipped
        id: skip
        env:
          REF: ${{ github.ref }}
          IS_TAGGED: ${{ steps.version.outputs.is_tagged }}
        run: |
          # Skip main-branch builds when the commit already carries a release tag
          # (the tag-triggered run handles the release).
          if [[ "$REF" == refs/heads/main && "$IS_TAGGED" == "true" ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        if: steps.skip.outputs.should_skip != 'true'
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          # App telemetry, baked from repo secrets/variables (empty on a fork → reports nothing).
          SF_URL: ${{ secrets.COLOPHON_TELEMETRY_SERVER_URL || vars.COLOPHON_TELEMETRY_SERVER_URL }}
          SF_KEY: ${{ secrets.COLOPHON_TELEMETRY_APP_KEY || vars.COLOPHON_TELEMETRY_APP_KEY }}
        run: |
          bin=colophon
          [ "$GOOS" = windows ] && bin=colophon.exe
          pkg=github.com/jmylchreest/colophon/internal
          go build -trimpath -ldflags "-s -w \
            -X ${pkg}/cli.version=${VERSION_TAG} \
            -X ${pkg}/telemetry.DefaultServerURL=${SF_URL} \
            -X ${pkg}/telemetry.DefaultAppKey=${SF_KEY}" \
            -o "$bin" ./cmd/colophon

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p dist
          name="colophon_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = windows ]; then
            zip "dist/${name}.zip" colophon.exe
          else
            tar -czf "dist/${name}.tar.gz" colophon
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: colophon_${{ needs.prepare.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.should_skip != 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          cd release
          sha256sum * > checksums.txt
          ls -la

      - name: Changelog
        env:
          IS_RELEASE: ${{ needs.prepare.outputs.is_release }}
        run: |
          if [[ "$IS_RELEASE" == "true" ]]; then
            prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$prev" ]; then
              { echo "## Changelog"; echo; \
                git log --pretty=format:"* %h %s" "${prev}..HEAD" \
                  | grep -Ev "^\* [a-f0-9]+ (docs|test|ci|chore):" || echo "* No notable changes"; \
              } > changelog.txt
            else
              echo "* Initial release" > changelog.txt
            fi
          else
            echo "Automated snapshot build from main." > changelog.txt
          fi
          cat changelog.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RELEASE: ${{ needs.prepare.outputs.is_release }}
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          if [[ "$IS_RELEASE" == "true" ]]; then
            gh release create "$VERSION_TAG" --title "$VERSION_TAG" --notes-file changelog.txt release/*
          else
            gh release create "$VERSION_TAG" --title "Snapshot $VERSION" --prerelease --notes-file changelog.txt release/*
          fi

      # Keep the Releases page tidy. Snapshot builds publish a v…-dev.N prerelease on every
      # push to main, so prune all but the most recent few (deleting their tags too). Only on
      # snapshot builds — real releases are never pruned. Mirrors the histui workflow.
      - name: Prune old snapshot releases
        if: needs.prepare.outputs.is_release != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION: "5"
        run: |
          echo "Keeping the ${RETENTION} most recent snapshot prereleases."
          # gh release list returns newest-first; keep the first $RETENTION, delete the rest.
          snapshots=$(gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-dev\\.")) | .tagName')
          count=0
          for tag in $snapshots; do
            count=$((count + 1))
            if [ "$count" -gt "$RETENTION" ]; then
              echo "Deleting old snapshot: ${tag}"
              gh release delete "${tag}" --yes --cleanup-tag || true
            fi
          done

      # Tag the in-repo ./search module so external consumers can `go get
      # github.com/jmylchreest/colophon/search@<version>`. Only on a real release, and only when
      # ./search actually changed since its last tag — the tag mirrors the colophon version (gaps
      # are fine for semver). `search/v*` does NOT match this workflow's `v*` trigger, so no loop.
      - name: Tag ./search module if changed
        if: needs.prepare.outputs.is_release == 'true'
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          last=$(git tag -l 'search/v*' --sort=-v:refname | head -1)
          if [ -n "$last" ] && git diff --quiet "$last" HEAD -- search/; then
            echo "./search unchanged since ${last}; not tagging."
            exit 0
          fi
          tag="search/${VERSION_TAG}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "${tag} already exists; nothing to do."
            exit 0
          fi
          echo "Tagging ${tag} (./search changed since ${last:-<no prior tag>})."
          git tag "$tag"
          git push origin "$tag"
