name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "!*SNAPSHOT*"
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race -timeout 120s ./...

      # The search engine is a separate module (go.work), so root ./... doesn't run its tests.
      - name: Test search module (race detector)
        run: go test -race -timeout 120s ./...
        working-directory: search

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Go/JS parity: the analyzer golden vectors and the emitted-index ranking must match.
      # The fixture is committed (and regenerated by the Go test above), so this runs standalone.
      - name: Test search reader (Go/JS parity)
        run: node --test search.test.mjs
        working-directory: search

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # golangci-lint also enforces formatting: the .golangci.yml formatters block
      # (gofmt + goimports) is checked here, so there is no separate gofmt step.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
