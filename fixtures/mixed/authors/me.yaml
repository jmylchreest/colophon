# An author is the byline shown to readers. A post's `author:` names one of these (by file
# stem or `id`); with none, the first author here is the default, else "Anonymous".
id: me
name: "Sam Avery"
bio: "Engineer and writer. Builds static sites with colophon and writes about the web, developer tools, and the occasional deep rabbit hole."
avatar_fit: cover
# File-path avatar: a file under the md-dir `content` source. The build resolves it the same
# way a markdown image embed resolves, publishes it once to /assets/face.png, and emits a
# root-anchored (depth-independent) src — so it renders from /, /posts/x/ and /authors/x/, and
# becomes the R2 URL under the assets/** route. (A data: URI or an https:// URL also work and
# pass through untouched.)
avatar: assets/face.png
email: "sam@example.com"
# urls render as labelled links on the author card (platform name where known, else the host)
urls:
  - "https://github.com/example"
  - "https://bsky.app/profile/example.com"
  - "https://example.com"
